<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactHub</title>
    <link rel="icon" href="./Images/favicon.png">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/stylesheet.css">
</head>

<body>
    <!-- --------------------------------------NAVBAR---------------------------------------------- -->
    <div class="mainnaav container-fluid mb-0 pb-0 bg-white position-fixed z-3">
        <nav class="navbar navbar-expand-lg" id="mainnav">
            <div class="container">
                <div class="d-flex align-items-center ">
                    <div
                        class="mainicon rounded-4 me-3 overflow-hidden d-flex justify-content-center align-items-center">
                        <i class="fa-solid fa-address-book fa-xl" style="color: rgb(255, 255, 255);"></i>
                    </div>
                    <div>
                        <h1 class="p-0 m-0">Contact<span>Hub</span></h1>
                        <p class="subspan p-0 m-0">Smart Contact Manager</p>
                    </div>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse " id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto align-items-center gap-3">
                        <li class="nav-item">
                            <button class="btn rounded-3" id="addContact" data-bs-toggle="modal"
                                data-bs-target="#staticBackdrop"> + Add Contact</button>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fa-solid fa-bell fa-lg"></i></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fa-solid fa-gear fa-lg"></i></a>
                        </li>
                    </ul>
                    <div class="profile rounded-circle ms-lg-3 overflow-hidden "><img src="./images/avatar-4.jpg" alt=""
                            class="w-100 rounded-circle"></div>
                </div>
            </div>
        </nav>
    </div>
    <!-- --------------------------------------MODAL---------------------------------------------- -->

    <div class=" rounded-4 modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false"
        tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable rounded-4">
            <div class="modal-content rounded-4">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="staticBackdropLabel">Add New Contact</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form action="" class="rounded-4 d-flex align-items-center justify-content-center flex-column">
                        <div class="d-flex flex-column gap-2 flex align-items-center justify-content-center mb-5">
                            <div class="personalphoto rounded-circle d-flex align-items-center justify-content-center ">
                                <i class="fa-solid fa-user fa-2xl" style="color: #ffffff;"></i>
                            </div>
                            <button type="button" class="btn btn-light border">
                                <i class="fa-solid fa-camera" style="color: #6a7282;"></i>
                                <span>Change Photo</span>
                            </button>
                        </div>
                        <div class="mb-3 w-100">
                            <label for="exampleFormControlInput1" class="form-label">Full Name <span>*</span></label>
                            <input type="text" class="form-control mb-3" id="exampleFormControlInput1"
                                placeholder="Enter Full Name" required>
                            <label for="exampleFormControlInput2" class="form-label">Phone Number <span>*</span></label>
                            <input type="tel" class="form-control  mb-3" id="exampleFormControlInput2"
                                placeholder="Enter Phone Number" required>
                            <label for="exampleFormControlInput3" class="form-label">Email address</label>
                            <input type="email" class="form-control  mb-3" id="exampleFormControlInput3"
                                placeholder="name@example.com">
                            <label for="exampleFormControlInput4" class="form-label">Address</label>
                            <input type="text" class="form-control  mb-2" id="exampleFormControlInput4"
                                placeholder="Enter Your Address">
                            <label for="exampleDataList" class="form-label">Group</label>
                            <input class="form-control  mb-3" list="datalistOptions" id="exampleDataList"
                                placeholder="Type to search...">
                            <datalist id="datalistOptions">
                                <option value="Family">
                                <option value="Friends">
                                <option value="Work">
                                <option value="School">
                                <option value="Other">
                            </datalist>
                            <div class="mb-3">
                                <label for="exampleFormControlTextarea1" class="form-label">Notes</label>
                                <textarea class="form-control  mb-3" id="exampleFormControlTextarea1" rows="3"
                                    placeholder="Enter Notes About This Contact"></textarea>
                            </div>
                        </div>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" value="" id="checkDefault1">
                                <label class="form-check-label" for="checkDefault1">
                                    Favorite
                                </label>
                            </div>
                            <div class="form-check  form-check-inline">
                                <input class="form-check-input" type="checkbox" value="" id="checkDefault2">
                                <label class="form-check-label" for="checkDefault2">
                                    Emergency
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer d-flex flex-row w-100 mt-2">
                            <button type="button" class="btn1 btn btn-secondary flex-fill"
                                data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn2 btn btn-primary flex-fill" id="addBtn">
                                <i class="fa-solid fa-check" style="color: rgb(255, 255, 255);"></i>
                                Save Contact
                            </button>
                        </div>
                    </form>

                </div>

            </div>
        </div>
    </div>


    <!-- --------------------------------------MODAL---------------------------------------------- -->
    <!-- --------------------------------------Body---------------------------------------------- -->

    <div class="container-fluid mainbody">
        <div class="container pt-3">
            <!-- --------------------------------------SUMMARY---------------------------------------------- -->

            <div class="summary row g-3 m-0 pt-5">
                <div class="col-12 col-md-4">
                    <div class="summ sall rounded-3 d-flex justify-content-start align-items-center">

                        <div class="rightsidesumm d-flex justify-content-center align-items-center ">
                            <div class="summicon rounded-2 d-flex justify-content-center align-items-center">
                                <i class="fa-solid fa-users" style="color: rgb(255, 255, 255);"></i>
                            </div>
                        </div>
                        <div class="leftsidesumm">
                            <h6>Total</h6>
                            <span  id="totalcontacts"></span>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="summ sfavo rounded-3 d-flex justify-content-start align-items-center">

                        <div class="rightsidesumm d-flex justify-content-center align-items-center ">
                            <div class="summicon rounded-2 d-flex justify-content-center align-items-center">
                                <i class="fa-solid fa-users" style="color: rgb(255, 255, 255);"></i>
                            </div>
                        </div>
                        <div class="leftsidesumm">
                            <h6>Favorites</h6>
                            <span id="favoritscount"></span>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="summ semmerg rounded-3 d-flex justify-content-start align-items-center">
                        <div class="rightsidesumm d-flex justify-content-center align-items-center ">
                            <div class="summicon rounded-2 d-flex justify-content-center align-items-center">
                                <i class="fa-solid fa-users" style="color: rgb(255, 255, 255);"></i>
                            </div>
                        </div>
                        <div class="leftsidesumm">
                            <h6>Emergency</h6>
                            <span id="emerncycount"></span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- --------------------------------------SUMMARY---------------------------------------------- -->
            <div class="container-fluid fac d-flex min-vh-100 gap-4 pt-3 flex-column flex-lg-row">
                <div class="allcontacts p-4">
                    <h2>All Contacts</h2>
                    <p>Manage and organize your 1 contacts</p>
                    <input id="search" type="search" class="form-control" placeholder="Search contacts...">
                    <div class="row pt-3 g-3 mt-2" id="contactlist">
                        

                    </div>
                </div>
                <div class="fae h-100 d-flex flex-column gap-4 pt-5">
                    <div class="card Favorites">
                        <div class="card-body d-flex justify-content-start align-items-start flex-column p-0">
                            <div
                                class="tpcard rounded-3 d-flex justify-content-start align-items-start gap-2 p-3 w-100">
                                <div class="rightsidecard d-flex justify-content-start align-items-center mb-2 ">
                                    <div
                                        class="favorateicon rounded-2 d-flex justify-content-center align-items-center">
                                        <i class="fa-solid fa-star" style="color: white;"></i>
                                    </div>
                                </div>
                                <div
                                    class="leftsidecard d-flex justify-content-center align-items-start flex-column gap-2">
                                    <h5>Favorites</h5>
                                    <div class="d-flex justify-content-start align-items-center gap-2">
                                        <span>Quick access to starred contacts</span>
                                    </div>
                                </div>
                            </div>

                            <div class="botcard1 w-100 bg-light d-flex flex-column justify-content-between align-items-center" id="favoritcard">
                            
                            </div>
                        </div>
                    </div>
                    <div class="card Favorites">
                        <div class="card-body d-flex justify-content-start align-items-start flex-column p-0">
                            <div
                                class="tpcard1 rounded-3 d-flex justify-content-start align-items-start gap-2 p-3 w-100">
                                <div class="rightsidecard d-flex justify-content-start align-items-center mb-2 ">
                                    <div
                                        class="Emergencyicon rounded-2 d-flex justify-content-center align-items-center">
                                        <i class="fa-solid fa-heart-pulse" style="color: white;"></i>
                                    </div>
                                </div>
                                <div
                                    class="leftsidecard d-flex justify-content-center align-items-start flex-column gap-2">
                                    <h5>Emergency</h5>
                                    <div class="d-flex justify-content-start align-items-center gap-2">
                                        <span>Important contacts for urgent calls</span>
                                    </div>
                                </div>
                            </div>

                            <div class="botcard1 w-100 bg-light d-flex justify-content-between align-items-center flex-column" id="emirgcard">

                            </div>
                        </div>
                    </div>

                </div>


            </div>

        </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <script src="./JS/bootstrap.min.js"></script>
        <script src="./JS/all.min.js"></script>
        <script src="./JS/script.js"></script>
        

</body>

</html>
